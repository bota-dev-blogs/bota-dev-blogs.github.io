<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated paper diagram</title>
  <style>
    :root { --bg: #fffdf8; --ink: #30324d; --muted: #686c80; --line: #505365; }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: "Comic Sans MS", "Microsoft YaHei", "Segoe UI", sans-serif; }
    body { width: var(--canvas-width); height: var(--canvas-height); overflow: hidden; }
    svg { display: block; width: 100%; height: 100%; }
    .title { font-size: 34px; font-weight: 700; letter-spacing: 0; fill: var(--ink); }
    .subtitle { font-size: 17px; fill: var(--muted); }
    .node { opacity: 1; transform-box: fill-box; transform-origin: center; }
    .node.highlighting .node-box { stroke: #ad67a7; }
    .node-box { stroke-width: 3; rx: 24; filter: drop-shadow(0 5px 0 rgba(48,50,77,.08)); }
    .kind-input .node-box { fill: #dff4ee; stroke: #259d8f; }
    .kind-method .node-box { fill: #fff0cf; stroke: #e99b1c; }
    .kind-output .node-box { fill: #e5eafe; stroke: #557bd8; }
    .node-label { font-size: 20px; font-weight: 700; text-anchor: start; fill: var(--ink); }
    .node-description { font-size: 14px; fill: var(--muted); text-anchor: start; }
    .node-icon { transform-box: fill-box; transform-origin: center; }
    .node-icon-bg { fill: #fff; stroke-width: 2; }
    .node-icon-line { fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .edge { fill: none; stroke: var(--edge-color, var(--line)); stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 7; opacity: .98; }
    .edge.flowing { opacity: 1; }
    .edge-label-bg { fill: var(--bg); opacity: .96; }
    .edge-label { font-size: 13px; font-weight: 600; fill: var(--muted); text-anchor: middle; }
    .grain { opacity: .11; }
    .node-box { transition: stroke .08s linear; }
  </style>
</head>

ason over non-text acoustic cues."},{"id":"e-asr-loop","from":"asr-trace","to":"realtime-loop","label":"text evidence","evidence":"Transcript state supports response and audit."},{"id":"e-reason-loop","from":"audio-reasoning","to":"realtime-loop","label":"audio evidence","evidence":"Realtime response can use prosody, sound, and turn context."},{"id":"e-loop-gateway","from":"realtime-loop","to":"tool-gateway","label":"intent gate","evidence":"Tool calls need validation before external action."}],"animation":[{"target":"e-stream-asr","effect":"flow","at":0,"loop":true,"speed":24,"period":1.8},{"target":"e-stream-reasoning","effect":"flow","at":0,"loop":true,"speed":24,"period":1.8},{"target":"e-asr-loop","effect":"flow","at":0,"loop":true,"speed":24,"period":1.8},{"target":"e-reason-loop","effect":"flow","at":0,"loop":true,"speed":24,"period":1.8},{"target":"e-loop-gateway","effect":"flow","at":0,"loop":true,"speed":24,"period":1.8}],"layoutMode":"layered"};

      [cy - 6, cy, cy + 6].forEach((yy) => group.append(el('circle', { cx, cy: yy, r: 1.9, fill: color })));
    } else if (iconName === 'filter') {
      path(`M ${cx - 12} ${cy - 11} H ${cx + 12} L ${cx + 4} ${cy} V ${cy + 11} H ${cx - 4} V ${cy} Z`);
    } else if (iconName === 'target') {
      [11, 6, 2].forEach((r) => group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy, r })));
    } else if (['lock', 'shield'].includes(iconName)) {
      if (iconName === 'shield') path(`M ${cx} ${cy - 12} L ${cx + 12} ${cy - 7} L ${cx + 9} ${cy + 5} Q ${cx} ${cy + 13} ${cx - 9} ${cy + 5} L ${cx - 12} ${cy - 7} Z`);
      else {
        path(`M ${cx - 7} ${cy - 2} V ${cy - 7} A 7 7 0 0 1 ${cx + 7} ${cy - 7} V ${cy - 2}`);
        frame({ x: cx - 10, y: cy - 2, width: 20, height: 15, rx: 4 });
      }
    } else if (iconName === 'document') {
      path(`M ${cx - 9} ${cy - 13} H ${cx + 4} L ${cx + 10} ${cy - 7} V ${cy + 13} H ${cx - 9} Z M ${cx + 4} ${cy - 13} V ${cy - 7} H ${cx + 10}`);
      line(cx - 4, cy - 1, cx + 5, cy - 1); line(cx - 4, cy + 5, cx + 6, cy + 5);
    } else if (iconName === 'subtitle') {
      frame({ x: cx - 13, y: cy - 9, width: 26, height: 18, rx: 4 });
      line(cx - 8, cy - 1, cx + 8, cy - 1); line(cx - 8, cy + 5, cx + 5, cy + 5);
    } else if (iconName === 'alert') {
      path(`M ${cx} ${cy - 13} L ${cx + 13} ${cy + 11} H ${cx - 13} Z M ${cx} ${cy - 4} V ${cy + 4}`);
      group.append(el('circle', { cx, cy: cy + 8, r: 1.7, fill: color }));
    } else if (iconName === 'miss') {
      group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy, r: 11 }));
      line(cx - 8, cy - 8, cx + 8, cy + 8);
    } else if (iconName === 'check') {
      group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy, r: 12 }));
      path(`M ${cx - 7} ${cy} L ${cx - 2} ${cy + 6} L ${cx + 8} ${cy - 7}`);
    } else if (['phone', 'edge-device'].includes(iconName)) {
      frame({ x: cx - 7, y: cy - 13, width: 14, height: 26, rx: 4 });
      iconName === 'edge-device' ? frame({ x: cx - 3, y: cy - 3, width: 6, height: 6, rx: 1 }) : line(cx - 3, cy + 9, cx + 3, cy + 9);
    } else if (iconName === 'fleet') {
      [[cx - 9, cy + 5], [cx, cy - 8], [cx + 9, cy + 5]].forEach(([px, py]) => frame({ x: px - 4, y: py - 4, width: 8, height: 8, rx: 2 }));
      path(`M ${cx - 9} ${cy + 5} L ${cx} ${cy - 8} L ${cx + 9} ${cy + 5}`);
    } else if (['chip', 'gpu'].includes(iconName)) {
      frame({ x: cx - 8, y: cy - 8, width: 16, height: 16, rx: 3 });
      line(cx - 13, cy - 5, cx - 8, cy - 5); line(cx + 8, cy - 5, cx + 13, cy - 5); line(cx - 13, cy + 5, cx - 8, cy + 5); line(cx + 8, cy + 5, cx + 13, cy + 5);
      if (iconName === 'gpu') circle({ cx, cy, r: 4 });
    } else if (iconName === 'server') {
      [cy - 7, cy, cy + 7].forEach((yy) => {
        frame({ x: cx - 12, y: yy - 3, width: 24, height: 6, rx: 2 });
        group.append(el('circle', { cx: cx + 8, cy: yy, r: 1.1, fill: color }));
      });
    } else if (['router', 'cloud', 'network'].includes(iconName)) {
      if (iconName === 'cloud') path(`M ${cx - 13} ${cy + 4} Q ${cx - 12} ${cy - 5} ${cx - 4} ${cy - 4} Q ${cx} ${cy - 12} ${cx + 8} ${cy - 4} Q ${cx + 14} ${cy - 3} ${cx + 13} ${cy + 4} Z`);
      else if (iconName === 'router') {
        frame({ x: cx - 10, y: cy + 5, width: 20, height: 6, rx: 2 });
        path(`M ${cx - 8} ${cy + 5} L ${cx - 12} ${cy - 10} M ${cx + 8} ${cy + 5} L ${cx + 12} ${cy - 10} M ${cx - 8} ${cy - 4} Q ${cx} ${cy - 12} ${cx + 8} ${cy - 4}`);
      } else {
        [[cx - 9, cy - 7], [cx + 9, cy - 8], [cx, cy + 9]].forEach(([px, py]) => group.append(el('circle', { cx: px, cy: py, r: 2.2, fill: color })));
        path(`M ${cx - 9} ${cy - 7} L ${cx + 9} ${cy - 8} L ${cx} ${cy + 9} Z`);
      }
    } else if (['clock', 'latency'].includes(iconName)) {
      group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy, r: 10 }));
      path(`M ${cx} ${cy} V ${cy - 6} M ${cx} ${cy} L ${cx + 6} ${cy + 3}`);
      if (iconName === 'latency') path(`M ${cx - 10} ${cy + 14} H ${cx - 4} L ${cx} ${cy + 9} L ${cx + 5} ${cy + 14} H ${cx + 12}`);
    } else if (iconName === 'event') {
      group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy, r: 4 }));
      path(`M ${cx} ${cy - 13} V ${cy - 8} M ${cx} ${cy + 8} V ${cy + 13} M ${cx - 13} ${cy} H ${cx - 8} M ${cx + 8} ${cy} H ${cx + 13}`);
    } else if (iconName === 'heartbeat') {
      path(`M ${cx - 14} ${cy + 1} H ${cx - 8} L ${cx - 4} ${cy - 7} L ${cx + 1} ${cy + 9} L ${cx + 6} ${cy - 4} L ${cx + 10} ${cy + 1} H ${cx + 14}`);
    } else if (iconName === 'camera') {
      frame({ x: cx - 12, y: cy - 7, width: 24, height: 16, rx: 3 });
      group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy: cy + 1, r: 4 }));
    } else if (iconName === 'video') {
      frame({ x: cx - 12, y: cy - 8, width: 24, height: 17, rx: 3 });
      path(`M ${cx - 3} ${cy - 4} L ${cx + 6} ${cy} L ${cx - 3} ${cy + 5} Z`);
    } else if (iconName === 'room') {
      frame({ x: cx - 13, y: cy - 3, width: 26, height: 10, rx: 5 });
      line(cx - 9, cy + 7, cx - 12, cy + 13); line(cx + 9, cy + 7, cx + 12, cy + 13);
      [[cx, cy - 11], [cx - 14, cy], [cx + 14, cy]].forEach(([px, py]) => group.append(el('circle', { cx: px, cy: py, r: 1.9, fill: color })));
    } else if (iconName === 'bot') {
      frame({ x: cx - 12, y: cy - 8, width: 24, height: 17, rx: 5 });
      line(cx, cy - 8, cx, cy - 14);
      group.append(el('circle', { cx, cy: cy - 15, r: 1.5, fill: color }));
      group.append(el('circle', { cx: cx - 5, cy, r: 1.7, fill: color }));
      group.append(el('circle', { cx: cx + 5, cy, r: 1.7, fill: color }));
      line(cx - 5, cy + 6, cx + 5, cy + 6);
    } else if (iconName === 'ear') {
      path(`M ${cx + 2} ${cy + 13} Q ${cx - 6} ${cy + 8} ${cx - 4} ${cy} Q ${cx - 2} ${cy - 11} ${cx + 6} ${cy - 10} Q ${cx + 13} ${cy - 9} ${cx + 12} ${cy - 1} Q ${cx + 12} ${cy + 5} ${cx + 5} ${cy + 7}`);
      path(`M ${cx + 4} ${cy - 2} Q ${cx + 8} ${cy - 3} ${cx + 8} ${cy + 2}`);
      path(`M ${cx - 12} ${cy - 4} Q ${cx - 18} ${cy} ${cx - 12} ${cy + 4}`);
    } else if (iconName === 'headphones') {
      path(`M ${cx - 12} ${cy + 1} A 12 12 0 0 1 ${cx + 12} ${cy + 1}`);
      frame({ x: cx - 15, y: cy, width: 6, height: 12, rx: 3 });
      frame({ x: cx + 9, y: cy, width: 6, height: 12, rx: 3 });
    } else if (iconName === 'link') {
      path(`M ${cx - 2} ${cy - 7} Q ${cx - 9} ${cy - 13} ${cx - 14} ${cy - 6} Q ${cx - 19} ${cy + 1} ${cx - 10} ${cy + 5}`);
      path(`M ${cx + 2} ${cy + 7} Q ${cx + 9} ${cy + 13} ${cx + 14} ${cy + 6} Q ${cx + 19} ${cy - 1} ${cx + 10} ${cy - 5}`);
      line(cx - 7, cy + 3, cx + 7, cy - 3);
    } else if (iconName === 'branch') {
      path(`M ${cx - 10} ${cy - 9} Q ${cx - 1} ${cy - 8} ${cx + 6} ${cy} Q ${cx - 1} ${cy + 8} ${cx - 10} ${cy + 9} M ${cx + 6} ${cy} H ${cx + 13}`);
      [[cx - 12, cy - 9], [cx - 12, cy + 9], [cx + 13, cy]].forEach(([px, py]) => group.append(el('circle', { cx: px, cy: py, r: 2.2, fill: color })));
    } else if (iconName === 'merge') {
      path(`M ${cx - 13} ${cy - 9} Q ${cx - 3} ${cy - 9} ${cx + 2} ${cy} Q ${cx - 3} ${cy + 9} ${cx - 13} ${cy + 9} M ${cx + 2} ${cy} H ${cx + 13}`);
      [[cx - 13, cy - 9], [cx - 13, cy + 9], [cx + 13, cy]].forEach(([px, py]) => group.append(el('circle', { cx: px, cy: py, r: 2.2, fill: color })));
    } else if (iconName === 'sliders') {
      [cx - 8, cx, cx + 8].forEach((px, index) => {
        line(px, cy - 12, px, cy + 12);
        group.append(el('circle', { cx: px, cy: cy + [-5, 5, -1][index], r: 2.5, fill: color }));
      });
    } else if (iconName === 'idea') {
      circle({ cx, cy: cy - 4, r: 8 });
      path(`M ${cx - 4} ${cy + 6} H ${cx + 4} M ${cx - 3} ${cy + 10} H ${cx + 3}`);
      line(cx, cy - 15, cx, cy - 18); line(cx - 10, cy - 12, cx - 13, cy - 15); line(cx + 10, cy - 12, cx + 13, cy - 15);
    } else if (iconName === 'music') {
      path(`M ${cx - 1} ${cy - 12} V ${cy + 6} L ${cx + 10} ${cy + 3} V ${cy - 14} L ${cx - 1} ${cy - 11}`);
      group.append(el('circle', { cx: cx - 6, cy: cy + 8, r: 4, fill: color }));
      group.append(el('circle', { cx: cx + 7, cy: cy + 5, r: 4, fill: color }));
    } else if (iconName === 'mask') {
      frame({ x: cx - 13, y: cy - 8, width: 26, height: 16, rx: 8 });
      group.append(el('circle', { cx: cx - 5, cy, r: 2.2, fill: color }));
      group.append(el('circle', { cx: cx + 5, cy, r: 2.2, fill: color }));
    } else if (iconName === 'gear') {
      group.append(el('circle', { class: 'node-icon-line', stroke: color, fill: 'none', cx, cy, r: 7 }));
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4;
        line(cx + Math.cos(a) * 11, cy + Math.sin(a) * 11, cx + Math.cos(a) * 15, cy + Math.sin(a) * 15);
      }
    } else {
      [-5, 0, 5].forEach((dy) => path(`M ${cx} ${cy - 10 + dy} L ${cx + 12} ${cy - 4 + dy} L ${cx} ${cy + 2 + dy} L ${cx - 12} ${cy - 4 + dy} Z`));
    }
    return group;
  };
  const wrapText = (parent, className, x, y, text, maxWidth, lineHeight, maxLines) => {
    const textNode = el('text', { class: className, x, y });
    parent.append(textNode);
    const words = String(text || '').split(/\s+/).filter(Boolean);
    const lines = [];
    let line = '';
    const fits = (value) => {
      textNode.textContent = value;
      return textNode.getComputedTextLength() <= maxWidth;
    };
    for (const word of words) {
      const candidate = line ? `${line} ${word}` : word;
      if (line && !fits(candidate)) {
        lines.push(line);
        line = word;
      } else {
        line = candidate;
      }
    }
    if (line) lines.push(line);
    const compactLines = lines.length ? lines : [''];
    const visibleLines = compactLines.slice(0, maxLines);
    if (compactLines.length > maxLines) {
      let last = visibleLines[maxLines - 1];
      while (last.length > 1 && !fits(`${last}…`)) last = last.slice(0, -1);
      visibleLines[maxLines - 1] = `${last}…`;
    }
    textNode.textContent = '';
    visibleLines.forEach((lineText, index) => {
      textNode.append(el('tspan', { x, dy: index ? lineHeight : 0 }, lineText));
    });
    return visibleLines.length;
  };

  const byId = Object.fromEntries(diagram.nodes.map((node) => [node.id, node]));
  const title = el('text', { x: 56, y: 66, class: 'title' }, diagram.title);
  content.append(title);
  wrapText(content, 'subtitle', 58, 98, diagram.subtitle || '', diagram.width - 116, 22, 2);

  const edgeNodes = {};
  const edgeLabels = [];
  const edgeLabelSpecs = [];
  const minNodeY = Math.min(...diagram.nodes.map((node) => node.y));
  const maxNodeBottom = Math.max(...diagram.nodes.map((node) => node.y + node.height));
  let upperTrack = minNodeY - 38;
  let lowerTrack = maxNodeBottom + 38;
  diagram.edges.forEach((edge, index) => {
    const from = byId[edge.from]; const to = byId[edge.to];
    if (!from || !to) return;
    const x1 = from.x + from.width; const y1 = from.y + from.height / 2;
    const x2 = to.x; const y2 = to.y + to.height / 2;
    const bend = Math.max(30, (x2 - x1) / 2);
    const rankDistance = Number(to.rank) - Number(from.rank);
    let pathData;
    if (rankDistance > 1) {
      const useLowerTrack = from.y > to.y || (from.y === to.y && lowerTrack < diagram.height - 18);
      const routeY = useLowerTrack ? lowerTrack : upperTrack;
      if (useLowerTrack) lowerTrack += 18; else upperTrack -= 18;
      const shoulder = Math.min(64, Math.max(38, (x2 - x1) / 4));
      pathData = `M ${x1} ${y1} C ${x1 + shoulder} ${y1}, ${x1 + shoulder} ${routeY}, ${x1 + shoulder * 2} ${routeY} L ${x2 - shoulder * 2} ${routeY} C ${x2 - shoulder} ${routeY}, ${x2 - shoulder} ${y2}, ${x2} ${y2}`;
    } else if (x2 > x1) {
      pathData = `M ${x1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2} ${y2}`;
    } else {
      const startX = from.x + from.width / 2;
      const startY = from.y + from.height;
      const endX = to.x + to.width / 2;
      const endY = to.y;
      const routeY = Math.max(startY, endY) + 36;
      pathData = `M ${startX} ${startY} C ${startX} ${routeY}, ${endX} ${routeY}, ${endX} ${endY}`;
    }
    const path = el('path', { id: edge.id, class: 'edge', d: pathData, style: `--edge-color: ${EDGE_COLORS[index % EDGE_COLORS.length]}` });
    edgeNodes[edge.id] = path;
    edgeLabelSpecs.push({ edge, path });
    content.append(path);
  });

  // Draw labels after every edge so no animated path can cut through the text.
  // Horizontal labels are more legible than text following steep bezier curves.
  edgeLabelSpecs.forEach(({ edge, path }, index) => {
    if (!edge.label) return;
    const point = path.getPointAtLength(path.getTotalLength() / 2);
    const group = el('g', { class: 'edge-label-group', 'data-edge-id': edge.id });
    content.append(group);
    wrapText(group, 'edge-label', point.x, point.y - 15, edge.label, 118, 14, 2);
    const label = group.querySelector('.edge-label');
    // Keep the label background clear of the animated stroke. The old first
    // offset left only a few pixels of clearance, so dashed flow marks were
    // visually clipped beneath the label.
    const offsets = [-32, -60, 32, 60, -88, 88, -116, 116];
    const overlaps = (a, b) => a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    const distanceToPath = (bounds) => {
      const length = path.getTotalLength();
      let nearest = Infinity;
      for (let distance = 0; distance <= length; distance += Math.max(4, length / 120)) {
        const point = path.getPointAtLength(distance);
        const dx = Math.max(bounds.x - point.x, 0, point.x - (bounds.x + bounds.width));
        const dy = Math.max(bounds.y - point.y, 0, point.y - (bounds.y + bounds.height));
        nearest = Math.min(nearest, Math.hypot(dx, dy));
      }
      return nearest;
    };
    let chosenOffset = null;
    for (const offset of offsets) {
      label.setAttribute('y', point.y + offset);
      const bounds = label.getBBox();
      const occupied = edgeLabels.slice(0, index).some((other) => overlaps(bounds, other.getBBox()));
      const overlapsNode = diagram.nodes.some((node) => overlaps(bounds, node));
      const inCanvas = bounds.x >= 0 && bounds.y >= 0 && bounds.x + bounds.width <= diagram.width && bounds.y + bounds.height <= diagram.height;
      if (!occupied && !overlapsNode && inCanvas && distanceToPath(bounds) >= 16) {
        chosenOffset = offset;
        break;
      }
      if (chosenOffset === null && inCanvas && !overlapsNode && !occupied) chosenOffset = offset;
    }
    if (chosenOffset !== null) label.setAttribute('y', point.y + chosenOffset);
    const bounds = label.getBBox();
    group.insertBefore(el('rect', { class: 'edge-label-bg', x: bounds.x - 6, y: bounds.y - 3, width: bounds.width + 12, height: bounds.height + 6, rx: 5 }), label);
    edgeLabels.push(label);
  });

  const nodeGroups = {};
  const iconGroups = {};
  diagram.nodes.forEach((node, index) => {
    const group = el('g', { id: node.id, class: `node kind-${node.kind}` });
    content.append(group);
    group.append(el('rect', { class: 'node-box', x: node.x, y: node.y, width: node.width, height: node.height }));
    iconGroups[node.id] = drawKindIcon(group, node, index);
    const textX = node.x + 64;
    const textWidth = node.width - 78;
    const labelLines = wrapText(group, 'node-label', textX, node.y + 32, node.label, textWidth, 23, 2);
    wrapText(group, 'node-description', textX, node.y + 60 + (labelLines - 1) * 21, node.description || '', textWidth, 17, 3);
    nodeGroups[node.id] = group;
  });

  window.setDiagramTime = (time) => {
    Object.values(nodeGroups).forEach((node) => {
      node.classList.remove('highlighting');
      node.style.transform = 'scale(1)';
      node.style.filter = 'drop-shadow(0 5px 0 rgba(29,42,45,.08))';
    });
    const cycleDuration = Math.max(0.1, Number(diagram.duration) || 6);
    const cycleCount = Math.max(1, Math.round(cycleDuration / ICON_MOTION.targetPeriodSeconds));
    Object.values(iconGroups).forEach((iconGroup, index) => {
      const phase = (time / cycleDuration) * Math.PI * 2 * cycleCount + index * ICON_MOTION.staggerRadians;
      const scale = 1 + Math.sin(phase) * ICON_MOTION.scaleAmplitude;
      const drift = Math.cos(phase) * ICON_MOTION.driftPx;
      iconGroup.style.transform = `translateY(${drift.toFixed(3)}px) scale(${scale.toFixed(4)})`;
    });
    Object.values(edgeNodes).forEach((edge) => {
      edge.classList.remove('flowing');
      edge.style.strokeDashoffset = '0';
    });
    diagram.animation.forEach((animation) => {
      if (time < animation.at) return;
      const target = nodeGroups[animation.target] || edgeNodes[animation.target];
      if (!target) return;
      if (animation.effect === 'flow') {
        target.classList.add('flowing');
        const speed = animation.speed || 24;
        target.style.strokeDashoffset = `${-((time - animation.at) * speed % 24)}`;
      }
      if (animation.effect === 'highlight') {
        target.classList.add('highlighting');
        const period = animation.period || 1.8;
        const phase = ((time - animation.at) % period) / period;
        const pulse = (Math.sin(phase * Math.PI * 2) + 1) / 2;
        target.style.transform = `scale(${1 + pulse * 0.012})`;
        target.style.filter = `drop-shadow(0 5px 0 rgba(29,42,45,.08)) drop-shadow(0 0 ${6 + pulse * 12}px rgba(239,120,92,${0.18 + pulse * 0.38}))`;
      }
    });
  };
  window.setDiagramTime(0);
</script>
</body>
</html>
